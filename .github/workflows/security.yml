name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install security tooling and project
        run: python -m pip install . bandit==1.9.4 pip-audit==2.10.1
      - name: Bandit
        run: python -m bandit -r src -q
      - name: Dependency audit
        run: python -m pip_audit --local
